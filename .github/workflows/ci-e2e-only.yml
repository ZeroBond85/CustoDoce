name: CI - E2E Smoke Only

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA'
        required: false
        default: 'master'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.14.6'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
  PIP_NO_WARN_YANKED: 1
  STREAMLIT_DISABLE_CACHING_WARNING: 1

concurrency:
  group: ci-e2e-only-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || 'master' }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: E2E smoke — server + login + page crawl (19 pages)
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-smoke-screenshots
          path: tests/e2e/e2e_screenshots/
