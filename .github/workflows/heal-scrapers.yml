name: Heal Scrapers

on:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read

jobs:
  scrape:
    concurrency:
      group: scrape-heal-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: heal
    secrets:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}