name: Heal Scrapers

on:
  schedule:
    - cron: '0 0 */15 * *'  # A cada 15 dias às 00:00 UTC

jobs:
  scrape:
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: heal
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}