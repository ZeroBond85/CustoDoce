name: Scrape Reusable

on:
  workflow_call:
    inputs:
      mode:
        description: 'Modo de execução: cron, on_demand ou heal'
        required: true
        type: string
        default: 'cron'
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string
      dry_run:
        description: 'Modo de teste (não executa scraping real)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Ignorar freshness check (coleta full)'
        required: false
        type: boolean
        default: false
    secrets:
      SUPABASE_URL:
        required: true
      SUPABASE_SERVICE_ROLE_KEY:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      GROQ_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      HF_API_KEY:
        required: false
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USER:
        required: false
      SMTP_PASSWORD:
        required: false
      SMTP_FROM:
        required: false
      ALERT_EMAIL_TO:
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execução: cron, on_demand ou heal'
        required: true
        type: string
        default: 'cron'
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string
      dry_run:
        description: 'Modo de teste (não executa scraping real)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Ignorar freshness check (coleta full)'
        required: false
        type: boolean
        default: false

env:
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
  PYTHONPATH: ${{ github.workspace }}
  PIP_NO_WARN_YANKED: 1
  PYTHONUNBUFFERED: '1'
  STREAMLIT_DISABLE_CACHING_WARNING: 1
  APP_ENV: ci

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      stores: ${{ steps.sync_stores.outputs.stores }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
        
      - name: Install dependencies
        run: pip install -r requirements-prod.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Sync stores
        id: sync_stores
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_all_store_fields.py
      - name: Check time budget for sync stores
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "sync-stores"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Acquire scrape lock
        run: python scripts/scrape_lock.py acquire ${{ github.run_id }}
        if: inputs.dry_run == false

  scrape:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 130
    strategy:
      fail-fast: false
      matrix:
        tier: [1, 2a, 2b, 3]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
        
      - name: Install dependencies
        run: pip install -r requirements-prod.lock
      - name: Install system deps (tesseract, poppler, playwright)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
          pip install playwright==1.61.0
          playwright install chromium
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Run scraping for tier ${{ matrix.tier }}
        id: scrape_tier
        run: |
          ulimit -n 65536 && python main.py --tier ${{ matrix.tier }} --no-finalize --mode ${{ inputs.mode }} ${{ inputs.dry_run && '--dry-run' || '' }} ${{ inputs.force && '--force' || '' }} 2>&1 | tee /tmp/scrape_${{ matrix.tier }}.log
          # Falha o job APENAS em erros de nível [error] / exceções não tratadas.
          # Warnings de fetch de agregador (ex.: Tiendeo 403 "Client error") são
          # self-healing (a loja é pulada) e NÃO devem quebrar o tier inteiro.
          if grep -qE '\[error\s*\]|"level":\s*"error"|Error fetching|TIMEOUT after|falha no scraper' <(sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/scrape_${{ matrix.tier }}.log) 2>/dev/null; then
            echo "::error::[error] entries found in scrape output for tier ${{ matrix.tier }}"
            grep -E '\[error\s*\]|"level":\s*"error"|Error fetching|TIMEOUT after|falha no scraper' <(sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/scrape_${{ matrix.tier }}.log)
            exit 1
          fi
          # ── Guarda de cobertura mínima por tier ──
          # Falha o job se um tier com lojas habilitadas coletou ZERO ou quase
          # nada. Isto evita falsos negativos: lojas fora / tier zerado passam
          # despercebidos se forem apenas [warning]. Tier 2b é manual (esperado 0).
          # Pisos conservadores para NÃO dar falso positivo em dias lentos.
          if [ "${{ matrix.tier }}" != "2b" ]; then
            TOTAL=$(sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/scrape_${{ matrix.tier }}.log | grep -oE 'collection_done[^]]*total=[0-9]+' | grep -oE 'total=[0-9]+' | grep -oE '[0-9]+' | tail -1)
            TOTAL=${TOTAL:-0}
            case "${{ matrix.tier }}" in
              1)   MIN=15;;   # PDFs atacadistas (Tenda/metadados encarte)
              2a)  MIN=50;;   # VTEX e-commerce SP
              3)   MIN=50;;   # agregadores (Tiendeo/Guiato)
              *)   MIN=1;;
            esac
            if [ "$TOTAL" -lt "$MIN" ]; then
              echo "::error::Cobertura insuficiente no tier ${{ matrix.tier }}: coletados ${TOTAL} preços (< piso ${MIN}). Lojas podem estar fora ou scrape quebrado."
              exit 1
            fi
            echo "coverage_ok tier=${{ matrix.tier }} total=${TOTAL} piso=${MIN}"
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Check time budget for scraping
        run: python scripts/check_time_budget.py --timeout-minutes 120 --label "scrape-tier-${{ matrix.tier }}"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  enrich:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
        
      - name: Install dependencies
        run: pip install -r requirements-prod.lock
      - name: Install playwright (required by services.collector import)
        run: pip install playwright==1.61.0
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Enrich + report + cleanup (finalize, runs once)
        run: python main.py --finalize
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Check time budget for finalize
        run: python scripts/check_time_budget.py --timeout-minutes 20 --label "finalize"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  commit:
    needs: enrich
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
        
      - name: Install dependencies
        run: pip install -r requirements-prod.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Commit prices_latest.json
        run: python scripts/commit_prices.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check time budget for commit
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "commit"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  notify:
    needs: [commit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v7
      - name: Check time budget for notify
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "notify"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  cleanup:
    needs: [commit, notify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
        
      - name: Install dependencies
        run: pip install -r requirements-prod.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Release scrape lock
        run: python scripts/scrape_lock.py release ${{ github.run_id }}
        if: always()
      - name: Check time budget for cleanup
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "cleanup"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}