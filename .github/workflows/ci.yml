name: CI - Testes e Qualidade

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  PYTHONUNBUFFERED: '1'
  PIP_EXTRA_INDEX_URL: 'https://download.pytorch.org/whl/cpu'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements-dev.txt
      - run: ruff check . --output-format=github
      - run: bandit -r admin/ dashboard/ services/ -x tests/
      - run: pip-audit --strict -s osv -r requirements.txt

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements-dev.txt
      - run: mypy . --config-file pyproject.toml

  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Check docs are in sync
        run: python scripts/sync_docs.py --check

  unit:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt -r tests/requirements-test.txt
      - run: python -m pytest tests/unit/ tests/schema/ -q --tb=short --no-header

  integration:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Só roda se tiver acesso aos secrets (PR de fork não tem)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt -r tests/requirements-test.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Run integration tests
        run: python -m pytest tests/integration/ -q --tb=short --no-header
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  deploy-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Deploy check
        run: python scripts/deploy_check.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      - name: DB schema validation
        run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Dashboard query smoke test (real DB)
        run: python scripts/validate_dashboard_queries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e-smoke:
    needs: [deploy-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # E2E contra Streamlit Cloud e flaky por sleep mode (~60s idle). Roda em
    # push + PR mas falhas do Streamlit Cloud NAO BLOQUEIAM merge (continue-on-error).
    # Para validar E2E em condicoes ideais, dispare via workflow_dispatch.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt -r tests/requirements-test.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Warmup Streamlit Cloud (keep alive during E2E)
        run: |
          for attempt in 1 2 3; do
            echo "=== Warmup attempt ${attempt} ==="
            python scripts/warmup_streamlit.py https://custodoce.streamlit.app
            sleep 10
          done
      - name: E2E smoke — tab navigation + calculadora
        run: python -m pytest tests/e2e/test_e2e_real.py -k "test_tab_navigates_without_error or test_calculadora" -v --tb=short --no-header
        env:
          STREAMLIT_URL: https://custodoce.streamlit.app
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

  real:
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
      - run: pip install -r requirements.txt -r requirements-dev.txt -r tests/requirements-test.txt
      - name: Real scraper tests
        run: python -m pytest tests/real/ -q --tb=short --no-header
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
