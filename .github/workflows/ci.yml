name: CI - Testes e Qualidade

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . --output-format=github --exclude=scripts/archive/

      - name: Bandit security
        run: bandit -r admin/ dashboard/ services/ -x tests/

      - name: Pytest
        run: python -m pytest tests/ --tb=short -q

      - name: pip-audit
        run: pip-audit --strict
        continue-on-error: true

      - name: mypy type check
        run: pip install types-PyYAML types-psycopg2 types-openpyxl && mypy . --ignore-missing-imports --explicit-package-bases --exclude='tests/' --exclude='scripts/archive/' | tail -5
        continue-on-error: true

      - name: App online check
        run: curl -s -o /dev/null -w "%{http_code}" https://custodoce.streamlit.app | grep -q 200 || echo "AVISO: Streamlit Cloud nao respondeu 200 (pode ser normal)"

  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install deps
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install psycopg2-binary

      - name: DB schema validation
        run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        continue-on-error: true
