name: CI - Testes e Qualidade

on:
  push:
    branches: [master]
    paths:
      - '**.py'
      - '**.md'
      - '**.yaml'
      - '**.yml'
      - 'requirements*.txt'
      - 'requirements*.lock'
      - 'requirements*.in'
      - 'LESSONS.md'
      - 'REGRAS.md'
      - 'AGENTS.md'
      - 'tests/**'
      - 'scrapers/**'
      - 'parsers/**'
      - 'services/**'
      - 'config/**'
      - 'supabase/**'
      - '!docs/**'
  pull_request:
    branches: [master]
    paths:
      - '**.py'
      - '**.md'
      - '**.yaml'
      - '**.yml'
      - 'requirements*.txt'
      - 'requirements*.lock'
      - 'requirements*.in'
      - 'LESSONS.md'
      - 'REGRAS.md'
      - 'AGENTS.md'
      - 'tests/**'
      - 'scrapers/**'
      - 'parsers/**'
      - 'services/**'
      - 'config/**'
      - 'supabase/**'
      - '!docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14.6'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
  PYTHONUNBUFFERED: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python scripts/check_environment_parity.py
      - run: ruff check . --output-format=github
      - name: Security lint (Supabase RLS + RPC)
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/db_security_lint.py --quick
        continue-on-error: true
      - name: detect-secrets scan
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: |
          python -m detect_secrets scan --baseline .secrets.baseline \
            admin/ dashboard/ services/ scrapers/ parsers/ scripts/ telegram_bot/ config/ .github/workflows/
        continue-on-error: true
      - run: bandit -r admin/ dashboard/ services/ -x tests/
      - name: Audit dependencies
        id: audit
        run: |
          # NOTA: pip-audit --strict significa "falha se a COLETA de dependencias
          # falhar" (nao "falha em vulnerabilidades"). Em CI (ubuntu/Py3.14)
          # a coleta de alguma dep de requirements.txt falha -> exit 1 mesmo sem
          # vulnerabilidades. Removemos --strict para falhar APENAS em vulns reais.
          # O shell do GitHub Actions roda com -e; os greps abaixo retornam 1 quando
          # nao ha match (sem vulns), entao usamos || true para nao abortar o script.
          audit_result=$(pip-audit -s osv -r requirements.txt)
          exit_code=$?
          severity=$(echo "$audit_result" | grep -oP 'Severity: \K[^ ]+' || true)
          description=$(echo "$audit_result" | grep -oP 'Description: \K.*' | head -n 1 || true)
          echo "severity=$severity" >> $GITHUB_OUTPUT
          echo "description=$description" >> $GITHUB_OUTPUT
          echo "result=$audit_result" >> $GITHUB_OUTPUT
          if [[ "$severity" == "HIGH" || "$severity" == "CRITICAL" ]]; then
            echo "::error::CVE detected: $severity - $description"
            exit 1
          fi
          if [[ $exit_code -ne 0 ]]; then
            echo "::warning::pip-audit exited $exit_code mas nenhuma severidade HIGH/CRITICAL foi parseada (possivel falha de coleta de dependencia, nao vulnerabilidade)"
          fi
        if: github.event_name == 'pull_request'
      - name: Check time budget for lint
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "lint"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: mypy . --config-file pyproject.toml
      - name: Check time budget for typecheck
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "typecheck"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Check docs are in sync (v2 heading-aware)
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: python scripts/sync_docs.py --analyze
      - name: Check docs content drift (strict + experimental)
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: python scripts/sync_docs.py --check --strict --experimental
      - name: Validate AGENTS.md schema
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: python scripts/agents_tool.py --check
      - name: Validate all MD timestamps (max 14 days)
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: python scripts/validate_md_timestamps.py --max-age-days 14
      - name: Check time budget for docs-sync
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "docs-sync"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: MD v2 Health Pulse (Read-only check)
        run: python scripts/sync_md_v2.py --pulse
        continue-on-error: true

  unit:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Validate schema manifest (SQL → mock alignment)
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: |
          python scripts/generate_schema_manifest.py
          python -m pytest tests/unit/test_validate_mocks_against_manifest.py -q --no-header
      - name: Run unit tests
        run: python -m pytest tests/unit/ tests/schema/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Check time budget for unit tests
        run: python scripts/check_time_budget.py --timeout-minutes 15 --label "unit"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Notify unit test result
        if: always()
        run: |
          echo "Notifications via Telegram removidas — e-mails já são suficientes"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  integration:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Run integration tests
        run: python -m pytest tests/integration/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Check time budget for integration tests
        run: python scripts/check_time_budget.py --timeout-minutes 30 --label "integration"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  deploy-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
      - run: pip install -r requirements-prod.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Deploy check
        run: python scripts/deploy_check.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: DB schema validation
        run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Dashboard query smoke test (real DB)
        run: python scripts/validate_dashboard_queries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Check time budget for deploy-check
        run: python scripts/check_time_budget.py --timeout-minutes 15 --label "deploy-check"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Notify deploy-check result
        if: always()
        run: |
          echo "Notifications via Telegram removidas — e-mails já são suficientes"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  e2e-smoke:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: E2E smoke — server + login + page crawl (19 pages)
        id: e2e-smoke
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-smoke-screenshots
          path: tests/e2e/e2e_screenshots/
      - name: Check time budget for e2e-smoke
        run: python scripts/check_time_budget.py --timeout-minutes 30 --label "e2e-smoke"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        if: always()
      - name: Notify e2e-smoke result
        if: always()
        run: |
          echo "Notifications via Telegram removidas — e-mails já são suficientes"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  e2e-smoke-pr:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: E2E smoke PR — crawl básico
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Check time budget for E2E smoke PR
        run: python scripts/check_time_budget.py --timeout-minutes 20 --label "e2e-smoke-pr"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Notify e2e-smoke-pr result
        if: always()
        run: |
          echo "Notifications via Telegram removidas — e-mails já são suficientes"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  real:
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-tesseract-poppler-${{ runner.os }}
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Run real scraper tests
        run: python -m pytest tests/real/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Check time budget for real tests
        run: python scripts/check_time_budget.py --timeout-minutes 45 --label "real"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Notify real result
        if: always()
        run: |
          echo "Notifications via Telegram removidas — e-mails já são suficientes"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}