name: CI - Testes e Qualidade

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  PYTHONUNBUFFERED: '1'
  PIP_EXTRA_INDEX_URL: 'https://download.pytorch.org/whl/cpu'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: python scripts/check_environment_parity.py
      - run: ruff check . --output-format=github
      - name: Security lint (Supabase RLS + RPC)
        run: python scripts/db_security_lint.py --quick
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: detect-secrets scan
        run: |
          python -m detect_secrets scan --baseline .secrets.baseline \
            admin/ dashboard/ services/ scrapers/ parsers/ scripts/ telegram_bot/ config/ .github/workflows/
        continue-on-error: true
      - name: Validate schema manifest (SQL → mock alignment)
        run: |
          python scripts/generate_schema_manifest.py
          python -m pytest tests/unit/test_validate_mocks_against_manifest.py -q --no-header
      - run: bandit -r admin/ dashboard/ services/ -x tests/
      - run: pip-audit --strict -s osv -r requirements.txt

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: mypy . --config-file pyproject.toml

  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Check docs are in sync (v2 heading-aware)
        run: python scripts/sync_docs.py --analyze
      - name: Check docs content drift (strict + experimental)
        run: python scripts/sync_docs.py --check --strict --experimental
        timeout-minutes: 3
      - name: Validate AGENTS.md schema
        run: python scripts/agents_tool.py --check
      - name: Validate all MD timestamps (max 14 days)
        run: python scripts/validate_md_timestamps.py --max-age-days 14
        timeout-minutes: 2
      - name: MD v2 Health Pulse (Read-only check)
        run: python scripts/sync_md_v2.py --pulse
        continue-on-error: true

  unit:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/unit/ tests/schema/ -q --tb=short --no-header --durations=5
      - name: Check time budget
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "unit"
        if: always()

  integration:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Run integration tests
        run: python -m pytest tests/integration/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Check time budget
        run: python scripts/check_time_budget.py --timeout-minutes 15 --label "integration"
        if: always()

  deploy-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Deploy check
        run: python scripts/deploy_check.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      - name: DB schema validation
        run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Dashboard query smoke test (real DB)
        run: python scripts/validate_dashboard_queries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e-smoke:
    needs: [deploy-check]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          echo "Streamlit PID: $!"
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: E2E smoke — server + login + page crawl (19 pages)
        id: e2e-smoke
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-smoke-screenshots
          path: tests/e2e/e2e_screenshots/
      - name: Check time budget
        run: python scripts/check_time_budget.py --timeout-minutes 25 --label "e2e-smoke"
        if: always()

  e2e-smoke-pr:
    needs: [lint, typecheck]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Install Playwright browsers
        run: python -m playwright install chromium
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: E2E smoke PR — crawl basico
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

  real:
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
      - run: pip install -r requirements.lock
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Real scraper tests
        run: python -m pytest tests/real/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Check time budget
        run: python scripts/check_time_budget.py --timeout-minutes 30 --label "real"
        if: always()
