name: CI - Testes e Qualidade

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . --output-format=github --exclude=scripts/archive/

      - name: Bandit security
        run: bandit -r admin/ dashboard/ services/ -x tests/

      - name: Pytest
        run: python -m pytest tests/ --tb=short -q

      - name: pip-audit
        run: pip-audit --strict
        continue-on-error: true

      - name: mypy type check
        run: pip install types-PyYAML types-psycopg2 types-openpyxl && mypy . --ignore-missing-imports --explicit-package-bases --exclude='tests/' --exclude='scripts/archive/' | tail -5
        continue-on-error: true

      - name: App online check (com warm-up)
        run: python scripts/validate_streamlit_cloud.py
        env:
          STREAMLIT_APP_URL: https://custodoce.streamlit.app
        continue-on-error: true
