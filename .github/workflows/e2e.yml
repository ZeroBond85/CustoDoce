name: E2E Dashboard - Producao Real

on:
  schedule:
    - cron: '0 6 * * 1/2'   # Seg quinzenal (06h UTC = 03h BRT)
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Atualizar baselines visuais'
        type: boolean
        default: false
      skip_visual:
        description: 'Pular visual regression'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'
  STREAMLIT_URL: https://custodoce.streamlit.app

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Embedding Model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface/hub/
          key: embeddings-${{ runner.os }}-paraphrase-multilingual
          restore-keys: embeddings-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-e2e.txt
          playwright install chromium --with-deps

      - name: Warmup Streamlit Cloud
        run: python scripts/warmup_streamlit.py ${{ env.STREAMLIT_URL }}

      - name: Test Supabase Connection
        run: |
          python -c "from supabase import create_client; import os; s = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_ROLE_KEY']); r = s.table('prices').select('id').limit(1).execute(); print(f'Supabase OK: {len(r.data or [])} rows')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Real DB Tests
        run: pytest tests/test_db_real.py tests/test_scrapers_real.py tests/test_telegram_real.py -m slow -v --tb=short --json-report --json-report-file=.pytest_db.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E Tests (Dashboard + Playwright + Flyers)
        run: |
          pytest tests/e2e_dashboard.py tests/e2e_real.py -v \
            --tb=short \
            --html=report.html \
            --self-contained-html \
            -k "not visual"
        env:
          STREAMLIT_URL: ${{ env.STREAMLIT_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Visual Regression
        if: ${{ !inputs.skip_visual }}
        run: pytest tests/e2e_dashboard.py::TestVisualRegression -v --tb=short
        env:
          STREAMLIT_URL: ${{ env.STREAMLIT_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Update Baselines
        if: ${{ inputs.update_baselines }}
        run: UPDATE_BASELINES=1 pytest tests/e2e_dashboard.py::TestVisualRegression -v
        env:
          STREAMLIT_URL: ${{ env.STREAMLIT_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Send Telegram Alert on Failure
        if: failure()
        run: |
          python -c "import os, httpx; token = os.environ.get('TELEGRAM_TOKEN', ''); chat_id = os.environ.get('TELEGRAM_CHAT_ID', ''); status = '${{ job.status }}'; run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'; msg = f'⚠️ E2E Pipeline FALHOU\nStatus: {status}\nRun: {run_url}'; r = httpx.post(f'https://api.telegram.org/bot{token}/sendMessage', json={'chat_id': chat_id, 'text': msg, 'parse_mode': 'Markdown'}, timeout=10)"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send E2E Report Email
        if: always()
        run: python scripts/send_e2e_report.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: custodoce@gmail.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-report
          path: report.html
          retention-days: 1

      - name: Upload Visual Diffs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-diffs
          path: tests/visual_diffs/
          retention-days: 1
