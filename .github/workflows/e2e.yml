name: E2E - Teste Completo

on:
  schedule:
    - cron: '0 10 1 * *'   # Dia 1 de cada mes, 07:00 BRT
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Atualizar baselines visuais'
        type: boolean
        default: false
      skip_visual:
        description: 'Pular visual regression'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.14.6'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-local:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock

      - run: pip install -r requirements-test.lock

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright
        run: python -m playwright install chromium --with-deps

      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run E2E Tests (all pages)
        run: python -m pytest tests/e2e/test_e2e_real.py -v --tb=short --html=report.html --self-contained-html -m "not flyer_health"
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Flyer Images Health Check (external URLs)
        if: always()
        continue-on-error: true
        run: python -m pytest tests/e2e/test_e2e_real.py::TestFlyerImages -v --tb=short
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Visual Regression
        if: ${{ !inputs.skip_visual }}
        run: python -m pytest tests/e2e/test_e2e_dashboard.py::test_visual_regression -v --tb=short
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          UPDATE_BASELINES: '1'

      - name: Update Baselines
        if: ${{ inputs.update_baselines }}
        run: UPDATE_BASELINES=1 python -m pytest tests/e2e/test_e2e_dashboard.py::test_visual_regression -v
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-report-local
          path: report.html
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-diffs
          path: tests/visual_diffs/
          retention-days: 7

  e2e-cloud:
    needs: [e2e-local]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: e2e-cloud-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock

      - run: pip install -r requirements-test.lock

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright + browsers
        run: python -m playwright install chromium --with-deps

      - name: Warmup Streamlit Cloud (Playwright)
        continue-on-error: true
        run: python scripts/warmup_streamlit.py https://custodoce.streamlit.app '' 4
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Cloud smoke test (todos os tabs + calculadora)
        run: |
          python -m pytest tests/e2e/test_e2e_real.py \
            -k "test_tab_navigates_without_error or test_calculadora" \
            -v --tb=long --no-header
        env:
          STREAMLIT_URL: https://custodoce.streamlit.app
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
