name: sanitize-check
on:
  schedule:
    - cron: '0 12 * * 1'  # Segunda 12h UTC (9h BRT)
  workflow_dispatch:

concurrency:
  group: sanitize-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
      - name: Install deps
        run: pip install -r requirements-prod.lock -q
      - name: Dry-run sanitize (fail if residue detected)
        run: |
          python scripts/sanitize.py --dry-run 2>&1
          echo ""
          echo "=== Nenhum residuo detectado. Working tree limpo. ==="
