name: sanitize-check
on:
  schedule:
    - cron: '0 12 * * 1'  # Segunda 12h UTC (9h BRT)
  workflow_dispatch:

jobs:
  sanitize-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock -q
      - name: Dry-run sanitize (fail if residue detected)
        run: |
          python scripts/sanitize.py --dry-run 2>&1
          echo ""
          echo "=== Nenhum residuo detectado. Working tree limpo. ==="
