name: Backup - Database

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      keep_count:
        description: "Numero de backups a manter"
        required: false
        default: "4"
        type: string

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.lock

      - name: Run RPC backup (porta 443 — sem bloqueio)
        id: backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/rpc_backup.py
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          FILENAME="custodoce_backup_rpc_${TIMESTAMP}.json.gz"
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "size=$(stat -c%s "${FILENAME}" 2>/dev/null || stat -f%z "${FILENAME}")" >> $GITHUB_OUTPUT

      - name: Upload backup to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: steps.backup.outputs.filename != ''
        with:
          name: db-backup-${{ steps.backup.outputs.timestamp }}
          path: ${{ steps.backup.outputs.filename }}
          retention-days: 14
          compression-level: 9

      - name: Cleanup old artifacts
        if: github.event_name == 'schedule'
        env:
          KEEP: ${{ github.event.inputs.keep_count || '4' }}
        run: |
          pip install github-artifacts-manager 2>/dev/null || true
          python scripts/cleanup_old_artifacts.py \
            --repo ${{ github.repository }} \
            --artifact-prefix db-backup- \
            --keep $KEEP \
            --token ${{ secrets.GITHUB_TOKEN }} || \
          echo "Cleanup skipped (github-artifacts-manager not available)"

      - name: Backup summary
        run: |
          echo "## Backup Database Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.backup.outputs.timestamp || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | ${{ steps.backup.outputs.filename || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | 14 dias (GitHub Artifacts) |" >> $GITHUB_STEP_SUMMARY