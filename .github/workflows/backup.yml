name: Backup - Database

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      keep_count:
        description: "Numero de backups a manter"
        required: false
        default: "4"
        type: string

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.lock

      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run RPC backup (porta 443 — sem bloqueio)
        id: backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/rpc_backup.py
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          FILENAME="custodoce_backup_rpc_${TIMESTAMP}.json.gz"
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "size=$(stat -c%s "${FILENAME}" 2>/dev/null || stat -f%z "${FILENAME}")" >> $GITHUB_OUTPUT
          echo "sha256sum=$(sha256sum "${FILENAME}" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "CI_JOB_START=${{ env.CI_JOB_START }}" >> $GITHUB_ENV

      - name: Check time budget for backup
        run: python scripts/check_time_budget.py --timeout-minutes 15 --label "backup"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

      - name: Generate SHA256 checksum
        run: sha256sum "${{ steps.backup.outputs.filename }}" > "${{ steps.backup.outputs.filename }}.sha256"
        if: steps.backup.outputs.filename != ''

      - name: Upload backup to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: steps.backup.outputs.filename != ''
        with:
          tag_name: backup-${{ steps.backup.outputs.timestamp }}
          files:
            - "${{ steps.backup.outputs.filename }}"
            - "${{ steps.backup.outputs.filename }}.sha256"
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Backup summary
        run: |
          echo "## Backup Database Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.backup.outputs.timestamp || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | ${{ steps.backup.outputs.filename || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamanho | ${{ steps.backup.outputs.size || 'N/A' }} bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Checksum | ${{ steps.backup.outputs.sha256sum || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | 30 dias (GitHub Releases) |" >> $GITHUB_STEP_SUMMARY

      - name: Notify backup result
        if: always()
        run: |
          python scripts/notify_security_issue.py "SUCCESS" "Backup gerado com sucesso: ${{ steps.backup.outputs.filename }}" "0"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify backup failure
        if: failure()
        run: |
          python scripts/notify_security_issue.py "FAILURE" "Falha no backup: ${{ steps.backup.outputs.filename || 'N/A' }}" "0"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}