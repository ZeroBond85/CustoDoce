name: On Demand Scrape

on:
  repository_dispatch:
    types: [scrape]
  workflow_dispatch:
    inputs:
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string

jobs:
  scrape:
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: on_demand
      stores_filter: ${{ github.event.inputs.stores_filter }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}