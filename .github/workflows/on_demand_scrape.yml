name: On Demand Scrape

on:
  repository_dispatch:
    types: [scrape]
  workflow_dispatch:
    inputs:
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string

jobs:
  scrape:
    concurrency:
      group: scrape-on-demand-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: on_demand
      stores_filter: ${{ github.event.inputs.stores_filter || github.event.client_payload.stores_filter }}
    secrets:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}