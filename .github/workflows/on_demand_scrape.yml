name: On Demand Scrape

on:
  repository_dispatch:
    types: [scrape]
  workflow_dispatch:
    inputs:
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  scrape:
    concurrency:
      group: scrape-on-demand-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: on_demand
      force: true
      stores_filter: ${{ github.event.inputs.stores_filter || github.event.client_payload.stores_filter }}
    secrets:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}