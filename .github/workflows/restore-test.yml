name: Backup - Restore Test

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Nome do artifact a testar (vazio = mais recente)"
        required: false
        default: ""
        type: string

concurrency:
  group: db-restore-test
  cancel-in-progress: true

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install supabase PyGithub 2>/dev/null

      - name: Download latest backup artifact
        if: github.event.inputs.artifact_name == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/download_latest_artifact.py \
            --repo "${{ github.repository }}" \
            --prefix "db-backup-" \
            --token "$GH_TOKEN" \
            --output-dir ./backup/

      - name: Download specified backup artifact
        if: github.event.inputs.artifact_name != ''
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: ./backup/

      - name: List downloaded files
        run: ls -lh backup/ || echo "No backup dir"

      - name: Validate backup file integrity
        run: |
          BACKUP_FILE=$(ls backup/custodoce_backup_rpc_*.json.gz 2>/dev/null | head -1)
          if [ -z "$BACKUP_FILE" ]; then
            echo "No .json.gz file found in backup/"
            ls -la backup/
            exit 1
          fi
          echo "Backup file: $BACKUP_FILE"
          gzip -t "$BACKUP_FILE" && echo "Gzip integrity: OK"
          gunzip -l "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_OUTPUT
        id: find_file

      - name: Dry-run restore validation (JSON via RPC)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/restore_from_json.py "${{ steps.find_file.outputs.BACKUP_FILE }}" --dry-run

      - name: Restore test summary
        run: |
          echo "## Restore Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | **Dry-run via RPC (port 443)** - sem modificar dados |" >> $GITHUB_STEP_SUMMARY
          echo "| Executado | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Artefato | ${{ github.event.inputs.artifact_name || 'mais recente' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | ${{ steps.find_file.outputs.BACKUP_FILE }} |" >> $GITHUB_STEP_SUMMARY