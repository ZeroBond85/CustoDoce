name: Backup - Restore Test

on:
  workflow_run:
    workflows: ['Backup - Database']
    types:
      - completed

env:
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

concurrency:
  group: db-restore-test
  cancel-in-progress: true

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock

      - name: Install dependencies
        run: pip install -r requirements-prod.lock

      - name: Download latest backup release
        if: github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/download_latest_release.py \
            --repo "${{ github.repository }}" \
            --prefix "backup-" \
            --token "$GH_TOKEN" \
            --output-dir ./backup/

      - name: List downloaded files
        run: ls -lh backup/ || echo "No backup dir"

      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Validate backup file integrity
        id: validate_backup
        run: |
          BACKUP_FILE=$(ls backup/*.json.gz backup/*.sql.gz 2>/dev/null | head -1)
          if [ -z "$BACKUP_FILE" ]; then
            echo "Erro: Arquivo de backup não encontrado."
            ls -la backup/
            exit 1
          fi
          echo "Backup file: $BACKUP_FILE"
          gzip -t "$BACKUP_FILE" && echo "Gzip integrity: OK" || (echo "Erro: Integridade do arquivo gzip inválida." && exit 1)
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_OUTPUT
          
          # Verificar checksum SHA256
          SHA256_FILE="${BACKUP_FILE}.sha256"
          if [ -f "$SHA256_FILE" ]; then
            EXPECTED_SHA256=$(head -c 64 "$SHA256_FILE" | awk '{print $1}')
            ACTUAL_SHA256=$(sha256sum "$BACKUP_FILE" | awk '{print $1}')
            if [ "$EXPECTED_SHA256" != "$ACTUAL_SHA256" ]; then
              echo "Erro: Checksum SHA256 não corresponde."
              exit 1
            fi
            echo "SHA256 integrity: OK"
          else
            echo "Aviso: Arquivo de checksum SHA256 não encontrado."
          fi
          echo "SHA256_FILE=$SHA256_FILE" >> $GITHUB_OUTPUT

      - name: Dry-run restore validation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: python scripts/rpc_restore.py "${{ steps.validate_backup.outputs.BACKUP_FILE }}" --dry-run
      - name: Check time budget for restore test
        run: python scripts/check_time_budget.py --timeout-minutes 20 --label "restore-test"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
          
      - name: Restore test summary
        run: |
          echo "## Restore Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | **Dry-run via RPC (port 443)** - sem modificar dados |" >> $GITHUB_STEP_SUMMARY
          echo "| Executado | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Backup | ${{ steps.validate_backup.outputs.BACKUP_FILE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checksum | ${{ steps.validate_backup.outputs.SHA256_FILE || 'Não aplicável' }} |" >> $GITHUB_STEP_SUMMARY
