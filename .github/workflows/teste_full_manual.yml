name: Teste_Full_Manual

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-manual-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14.6'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
  PYTHONUNBUFFERED: '1'
  PIP_NO_WARN_YANKED: 1
  STREAMLIT_DISABLE_CACHING_WARNING: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - run: python scripts/check_environment_parity.py
      - run: ruff check . --output-format=github
      - name: Security lint (Supabase RLS + RPC)
        run: python scripts/db_security_lint.py --quick
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: python -m detect_secrets scan --baseline .secrets.baseline admin/ dashboard/ services/ scrapers/ parsers/ scripts/ telegram_bot/ config/ .github/workflows/
      - run: |
          python scripts/generate_schema_manifest.py
          python -m pytest tests/unit/test_validate_mocks_against_manifest.py -q --no-header
      - run: bandit -r admin/ dashboard/ services/ -x tests/
      - run: pip-audit --strict -s osv -r requirements.txt

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - run: mypy . --config-file pyproject.toml

  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - run: python scripts/sync_docs.py --analyze
      - run: python scripts/sync_docs.py --sync
      - run: python scripts/sync_docs.py --check --strict --experimental
        timeout-minutes: 3
      - run: python scripts/agents_tool.py --check
      - run: python scripts/validate_md_timestamps.py --max-age-days 14
        timeout-minutes: 2
      - run: python scripts/sync_md_v2.py --pulse

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/unit/ tests/schema/ -q --tb=short --no-header --durations=5
      - run: python scripts/check_time_budget.py --timeout-minutes 10 --label "unit"
        if: always()

  integration:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/integration/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  deploy-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-prod.lock
      - run: pip install -r requirements-prod.lock
      - run: python scripts/deploy_check.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: python scripts/validate_dashboard_queries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  real:
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-tesseract-poppler-${{ runner.os }}
          restore-keys: |
            apt-tesseract-poppler-${{ runner.os }}-
      - name: Clean apt cache (fix tar permission error)
        if: always()
        run: |
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -rf /var/cache/apt/archives/partial
          echo "Cleaned apt cache problematic files"
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
      - run: pip install -r requirements-test.lock
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/real/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e-full:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short --no-header --durations=5 --capture=no -m "not visual"
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  diagnostics:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.lock
      - run: pip install -r requirements-dev.lock
      - run: python -m pytest tests/diagnostics/ -q --tb=short --no-header --durations=5 --capture=no

  visual:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-test.lock
      - run: pip install -r requirements-test.lock
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.lock') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Visual regression (cria baselines)
        run: UPDATE_BASELINES=1 python -m pytest tests/e2e/test_e2e_dashboard.py::test_visual_regression -v --tb=short
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-baselines
          path: tests/baselines/
          retention-days: 30

  results:
    if: always()
    needs:
      - lint
      - typecheck
      - docs-sync
      - unit
      - integration
      - deploy-check
      - e2e-full
      - real
      - diagnostics
      - visual
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          echo "## Resultados do Teste_Full_Manual" >> $GITHUB_STEP_SUMMARY
          echo '- lint: ${{ needs.lint.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- typecheck: ${{ needs.typecheck.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- docs-sync: ${{ needs.docs-sync.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- unit: ${{ needs.unit.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- integration: ${{ needs.integration.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- deploy-check: ${{ needs.deploy-check.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- e2e-full: ${{ needs.e2e-full.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- real: ${{ needs.real.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- diagnostics: ${{ needs.diagnostics.result }}' >> $GITHUB_STEP_SUMMARY
          echo '- visual: ${{ needs.visual.result }}' >> $GITHUB_STEP_SUMMARY
          ALL_GREEN=true
          for r in "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.docs-sync.result }}" "${{ needs.unit.result }}" "${{ needs.integration.result }}" "${{ needs.deploy-check.result }}" "${{ needs.e2e-full.result }}" "${{ needs.real.result }}" "${{ needs.diagnostics.result }}" "${{ needs.visual.result }}"; do
            if [ "$r" != "success" ]; then
              ALL_GREEN=false
              break
            fi
          done
          if [ "$ALL_GREEN" = true ]; then
            echo "## Todos os jobs passaram!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Alguns jobs falharam" >> $GITHUB_STEP_SUMMARY
          fi
