name: Teste_Full_Manual

on:
  workflow_dispatch:

concurrency:
  group: full-manual-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'
  PYTHONUNBUFFERED: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: python scripts/check_environment_parity.py
      - run: ruff check . --output-format=github
      - name: Security lint (Supabase RLS + RPC)
        run: python scripts/db_security_lint.py --quick
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: python -m detect_secrets scan --baseline .secrets.baseline admin/ dashboard/ services/ scrapers/ parsers/ scripts/ telegram_bot/ config/ .github/workflows/
        continue-on-error: true
      - run: |
          python scripts/generate_schema_manifest.py
          python -m pytest tests/unit/test_validate_mocks_against_manifest.py -q --no-header
      - run: bandit -r admin/ dashboard/ services/ -x tests/
      - run: pip-audit --strict -s osv -r requirements.txt

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: mypy . --config-file pyproject.toml

  docs-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: python scripts/sync_docs.py --analyze
      - run: python scripts/sync_docs.py --check --strict --experimental
        timeout-minutes: 3
      - run: python scripts/agents_tool.py --check
      - run: python scripts/validate_md_timestamps.py --max-age-days 14
        timeout-minutes: 2
      - run: python scripts/sync_md_v2.py --pulse
        continue-on-error: true

  unit:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/unit/ tests/schema/ -q --tb=short --no-header --durations=5
      - run: python scripts/check_time_budget.py --timeout-minutes 10 --label "unit"
        if: always()

  integration:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: python -m playwright install chromium
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/integration/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - run: python scripts/check_time_budget.py --timeout-minutes 15 --label "integration"
        if: always()

  deploy-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - run: python scripts/deploy_check.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      - run: python scripts/validate_db_schema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - run: python scripts/validate_dashboard_queries.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  real:
    needs: [integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-por poppler-utils
      - run: pip install -r requirements.lock
      - run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - run: python -m pytest tests/real/ -q --tb=short --no-header --durations=5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e-full:
    needs: [deploy-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Install Playwright
        run: python -m playwright install chromium --with-deps
      - name: Start Streamlit local server
        run: |
          nohup streamlit run admin/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit ready after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: E2E Smoke — crawl basico
        run: python -m pytest tests/e2e/test_e2e_smoke_basic.py -v --tb=short --no-header --durations=5
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: E2E Interactions — widgets em todas as paginas
        run: python -m pytest tests/e2e/test_e2e_interactions.py -v --tb=long --no-header
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: E2E Real — testes completos (responsive + interacoes)
        run: python -m pytest tests/e2e/test_e2e_real.py -v --tb=short --no-header
        env:
          STREAMLIT_URL: http://localhost:8501
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-full-screenshots
          path: |
            tests/e2e/e2e_screenshots/
            tests/e2e/interaction_screenshots/
          retention-days: 7

  visual:
    needs: [e2e-full]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.lock
      - name: Install Playwright
        run: python -m playwright install chromium --with-deps
      - name: Visual regression + dashboard tests (cloud)
        run: python -m pytest tests/e2e/test_e2e_dashboard.py -v --tb=short --no-header
        env:
          STREAMLIT_URL: https://custodoce.streamlit.app
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-diffs
          path: tests/visual_diffs/
          retention-days: 7

  results:
    needs: [unit, integration, e2e-full, real, deploy-check, visual]
    runs-on: ubuntu-latest
    steps:
      - run: echo "=== Teste_Full_Manual concluido ==="