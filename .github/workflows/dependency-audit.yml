name: Dependency Audit

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of month, 9am UTC — full audit + report
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - audit-dev
          - deptry
          - licenses
          - full
  pull_request:
    paths:
      - 'requirements.txt'
      - 'requirements-prod.in'
      - 'requirements-dev.in'
      - 'requirements-test.in'
      - 'requirements-prod.lock'
      - 'requirements-dev.lock'
      - 'requirements-test.lock'
      - 'requirements.lock'

env:
  PYTHON_VERSION: '3.14.6'
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-validation:
    name: Validate requirements.lock is in sync (blocks PR)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Install pip-tools
        run: pip install "pip-tools==7.5.3"
      - name: Regenerate all lock files from scratch (CPU-only torch)
        env:
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
        run: |
          pip-compile --allow-unsafe --no-strip-extras --output-file=requirements-prod.lock requirements-prod.in
          pip-compile --allow-unsafe --no-strip-extras --output-file=requirements-dev.lock requirements-dev.in requirements-prod.in
          pip-compile --allow-unsafe --no-strip-extras --output-file=requirements-test.lock requirements-test.in requirements-dev.in requirements-prod.in
          cp requirements-test.lock requirements.lock
      - name: Check if lock files changed
        run: |
          for f in requirements.lock requirements-prod.lock requirements-dev.lock requirements-test.lock; do
            git diff --exit-code "$f" && echo "$f is up to date" || {
              echo "::error::$f is out of sync with .in files"
              echo "::error::CRITICAL: Lock files MUST be generated on WSL/Linux (NOT Windows)."
              echo "::error::Run in WSL: cd /mnt/c/Zerobond/Code/CustoDoce && conda activate custodoce-314"
              echo "::error::Then: PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cpu pip-compile --allow-unsafe --no-strip-extras --output-file=$f ..."
              echo "::error::See LESSONS.md #52, REGRAS.md rule 5."
              exit 1
            }
          done
      - name: Check time budget for lock validation
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "lock-validation"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  audit-prod:
    name: Audit production deps (blocks PR)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Install pip-audit
        run: pip install "pip-audit==2.10.1"
      - name: Audit production deps (blocks if High/Critical)
        run: pip-audit --strict -s osv -r requirements.txt
      - name: Check time budget for audit-prod
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "audit-prod"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}

  audit-dev:
    name: Audit dev/test deps (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Install pip-audit
        run: pip install "pip-audit==2.10.1"
      - name: Audit dev deps (informational)
        continue-on-error: true
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: pip-audit --strict -s osv -r requirements-dev.in || true
      - name: Check time budget for dev audit
        run: python scripts/check_time_budget.py --timeout-minutes 5 --label "audit-dev"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Audit test deps (informational)
        continue-on-error: true
        run: pip-audit --strict -s osv -r requirements-test.in || echo "Known dev/test CVEs accepted — see docs/security.md"

  full-scan:
    name: Transitive/unused scan + licenses (monthly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Record start time
        run: echo "CI_JOB_START=$(date +%s)" >> $GITHUB_ENV
      - name: Install full toolchain
        run: pip install "deptry==0.25.1" "pip-licenses==5.5.5"
      - name: Scan for unused/transitive deps
        continue-on-error: true
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: deptry . || true
      - name: Check time budget for deptry scan
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "deptry-scan"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Generate license report
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: |
          mkdir -p .agent/audits
          pip-licenses --format=markdown > .agent/audits/license-report.md
      - name: Check time budget for license scan
        run: python scripts/check_time_budget.py --timeout-minutes 10 --label "license-scan"
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
      - name: Generate monthly audit report
        if: always()
        env:
          CI_JOB_START: ${{ env.CI_JOB_START }}
        run: |
          mkdir -p .agent/audits
          date_marker=$(date -u +%Y-%m-%d)
          cat > ".agent/audits/dependency-audit-${date_marker}.md" << EOF
          # Monthly Dependency Audit — ${date_marker}
          ## Summary
          - **Production audit**: see \`audit-prod\` job above
          - **Dev/test audit**: see \`audit-dev\` job (informational)
          - **Unused/transitive**: see \`full-scan\` deptry output
          - **Licenses**: see license-report.md
          - **Policy**: test deps CVEs accepted per \`docs/security.md\` (Sprint 12)
          EOF
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dep-audit-${{ github.run_number }}
          path: .agent/audits/
          retention-days: 180