name: Store Recovery Test

on:
  workflow_dispatch:
    inputs:
      stores:
        description: 'Lojas para testar, separadas por vírgula (ex: "Spani Atacadista,Max Atacadista SP")'
        required: true
        type: string
      timeout_minutes:
        description: 'Timeout por loja (minutos)'
        required: false
        default: '30'
        type: string
      pause_regular:
        description: 'Pausa a loja no scrape regular durante o teste (evita paralelismo)'
        required: false
        default: true
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          raw = os.environ.get("STORES", "")
          stores = [s.strip() for s in raw.split(",") if s.strip()]
          print("matrix=" + json.dumps(stores))
          PY
        env:
          STORES: ${{ github.event.inputs.stores }}

  setup:
    needs: [prepare]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.pause_regular == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Instalar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.lock
      - name: Pausar lojas no scrape regular
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/toggle_store_pause.py disable "${{ github.event.inputs.stores }}"

  test-store:
    needs: [prepare, setup]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.timeout_minutes) }}
    strategy:
      fail-fast: false
      matrix:
        store: ${{ fromJson(needs.prepare.outputs.matrix) }}
    concurrency:
      group: store-recovery-${{ matrix.store }}
      cancel-in-progress: false
    env:
      APP_ENV: ci
      CUSTODOCE_FORCE_SCRAPE: '1'
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Instalar sistema (tesseract/poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils
      - name: Instalar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.lock
      - name: Instalar Playwright chromium
        run: |
          python -m playwright install --with-deps chromium
      - name: Testar loja isolada
        run: python scripts/test_single_store.py "${{ matrix.store }}" 1800
      - name: Registro
        if: always()
        run: echo "Teste de ${{ matrix.store }} concluído"
        continue-on-error: true

  restore:
    needs: [prepare, test-store]
    if: ${{ always() && github.event.inputs.pause_regular == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Instalar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.lock
      - name: Retomar lojas no scrape regular
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/toggle_store_pause.py enable "${{ github.event.inputs.stores }}"
