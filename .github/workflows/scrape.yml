name: Scrape

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Seg-Sex às 00:00 UTC (dias uteis SP)
  workflow_dispatch:
    inputs:
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string

jobs:
  scrape:
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: cron
      stores_filter: ${{ github.event.inputs.stores_filter }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    concurrency:
      group: scrape-cron-${{ github.ref }}
      cancel-in-progress: false