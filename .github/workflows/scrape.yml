name: Scrape

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      stores_filter:
        description: 'Filtro de lojas para scraping (opcional)'
        required: false
        type: string
      force:
        description: 'Coleta full: ignora freshness check (não zera scrape_frequencies)'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    concurrency:
      group: scrape-cron-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/scrape-reusable.yml
    with:
      mode: cron
      stores_filter: ${{ github.event.inputs.stores_filter }}
      force: ${{ github.event.inputs.force == 'true' }}
    secrets:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}