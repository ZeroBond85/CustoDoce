# CustoDoce — Configuração Declarativa
# Edite este arquivo para ligar/desligar funcionalidades.
# NÃO é necessário editar código Python.

features:
  telegram:
    enabled: true
    notify_on_price_drop_pct: 15
    top5_report: true

  email:
    enabled: true
    daily_report: true
    alert_on_critical: true
    full_report: true
    # Lista de destinatários para relatórios automáticos E2E/diários.
    # Substituído por $ALERT_EMAIL_TO quando definido no ambiente (CI usa isso).
    # Mantenha fora do versionamento público dados sensíveis —
    # idealmente vazio em repo público, populado via env em produção.
    recipients: []

  scrapers:
    vtex: true
    pdf_flyers: true
    aggregators: true
    ocr_fallback: true

  # Vision-LLM para encartes graficos (Roldao/Max/Giga). Tesseract puro produz
  # lixo nesses flyers densos, entao usa-se vision (Groq -> OpenRouter -> HF).
  # Requer GROQ_API_KEY (ou OPENROUTER/HF) no ambiente. Degrada p/ OCR se ausente.
  ai:
    vision: true
    # Caminho hibrido para encartes DENSOS (RapidOCR + reconstrucao geometrica
    # de preco + LLM-texto p/ nomes). Em flyers densos a vision-LLM retorna 0
    # produtos gastando 30-40s; o hibrido le as centenas de regioes via OCR e
    # reconstroi precos pela geometria. Roteado por densidade (nº de regioes >
    # FLYER_DENSITY_THRESHOLD). Requer rapidocr instalado; degrada p/ vision se
    # ausente. LIGADO apos validacao: cents refinement (crop+re-OCR) melhora
    # precisao dos centavos (ex: .06 -> .90) com custo ~+20s/flyer.
    flyer_hybrid: true

  matcher:
    threshold: 80
    review_queue: true

  validity:
    enabled: true
    default_days: 7
    promotion_detection: true
    promotion_keywords:
      - promo
      - oferta
      - promocao
      - desconto
      - off

  alerts:
    price_variation_pct: 15
    coverage_min_pct: 50

  export:
    csv_enabled: true

  offline:
    enabled: false
    banner_message: "Modo Offline — os dados exibidos podem estar desatualizados ou indisponiveis."

  # Sprint 4 — Self-Healing Configuration (Lição #15)
  # Auto-disable / re-activation per Scraper (services/scraper_health.py).
  # CRITICAL: do not disable `required` -- AGENTS.md mandates that every
  # scraper records failures/successes so the heal pipeline can operate.
  self_healing:
    enabled: true
    required: true                  # Never set to false: enforces Lição #15.
    threshold_failures: 3           # Consecutive failures before auto-disable.
    heal_days: 15                   # Min idle days before attempt_heal is allowed.
    recovery_min_items: 1           # Min successful items to reactivate a scraper.

  # Per-ingredient overrides
  # Format: "Ingredient Canonical Name": { feature_path: value }
  overrides:
    "Leite Condensado Integral":
      scrapers:
        vtex: false


