# CustoDoce — Configuração Declarativa
# Edite este arquivo para ligar/desligar funcionalidades.
# NÃO é necessário editar código Python.

features:
  telegram:
    enabled: true
    notify_on_price_drop_pct: 15
    top5_report: true

  email:
    enabled: true
    daily_report: true
    alert_on_critical: true
    full_report: true

  scrapers:
    vtex: true
    pdf_flyers: true
    aggregators: true
    ocr_fallback: true

  matcher:
    threshold: 80
    review_queue: true

  validity:
    enabled: true
    default_days: 7
    promotion_detection: true
    promotion_keywords:
      - promo
      - oferta
      - promocao
      - desconto
      - off

  alerts:
    price_variation_pct: 15
    coverage_min_pct: 50

  export:
    csv_enabled: true
