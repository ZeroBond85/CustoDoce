# CustoDoce — Configuração Declarativa
# Edite este arquivo para ligar/desligar funcionalidades.
# NÃO é necessário editar código Python.

features:
  telegram:
    enabled: true
    notify_on_price_drop_pct: 15
    top5_report: true

  email:
    enabled: true
    daily_report: true
    alert_on_critical: true
    full_report: true

  scrapers:
    vtex: true
    pdf_flyers: true
    aggregators: true
    ocr_fallback: true

  matcher:
    threshold: 80
    review_queue: true

  validity:
    enabled: true
    default_days: 7
    promotion_detection: true
    promotion_keywords:
      - promo
      - oferta
      - promocao
      - desconto
      - off

  alerts:
    price_variation_pct: 15
    coverage_min_pct: 50

  export:
    csv_enabled: true

  offline:
    enabled: false
    banner_message: "Modo Offline — os dados exibidos podem estar desatualizados ou indisponiveis."

  # Sprint 4 — Self-Healing Configuration (Lição #15)
  # Auto-disable / re-activation per Scraper (services/scraper_health.py).
  # CRITICAL: do not disable `required` -- AGENTS.md mandates that every
  # scraper records failures/successes so the heal pipeline can operate.
  self_healing:
    enabled: true
    required: true                  # Never set to false: enforces Lição #15.
    threshold_failures: 3           # Consecutive failures before auto-disable.
    heal_days: 15                   # Min idle days before attempt_heal is allowed.
    recovery_min_items: 1           # Min successful items to reactivate a scraper.

  # Per-ingredient overrides
  # Format: "Ingredient Canonical Name": { feature_path: value }
  overrides:
    "Leite Condensado Integral":
      scrapers:
        vtex: false


