[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning:supabase",
]
markers = [
    "slow: marks tests as slow (real HTTP/Playwright/OCR)",
    "integration: marks tests that need real Supabase/network (skipped in unit CI)",
]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-m 'not slow and not integration' --ignore=tests/test_real_integration.py"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["F", "E", "W", "B", "S", "UP", "SIM", "C4"]
ignore = ["E501", "B006", "B008", "B023", "S101"]

[tool.ruff.lint.per-file-ignores]
"admin/app.py" = ["E402"]
"scripts/archive/*" = ["S501", "S603", "S311", "S112", "S110", "B007", "UP015", "C401", "S607"]
"scripts/*.py" = ["S501", "S603", "S311", "S112", "S110", "B007", "UP015", "C401", "E741", "W292", "S602"]
"tests/*" = ["S101", "S105", "B007", "C401", "E402", "F841", "F811", "S110", "SIM105", "SIM117"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
explicit_package_bases = true
exclude = [
    "scripts/archive/",
    "tests/",
    "scripts/",        # utility scripts, not core
    "scrapers/",       # network-dependent, many stub issues
    "services/",       # supabase-py JSON types cause 100+ false positives per file
    "telegram_bot/",   # python-telegram-bot stubs incomplete
    "admin/app.py",      # Streamlit + supabase type issues
    "admin/tabs/",       # dead code, stubs only, no real functions
    "data/",             # diagnostic/utility scripts
    "main.py",           # supabase-py JSON types
    "check_*.py",        # root-level utility scripts, not typechecked
]
warn_unused_ignores = false
check_untyped_defs = false
disallow_any_unimported = false
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = [
    "supabase.*",
    "postgrest.*",
    "streamlit.*",
    "plotly.*",
    "pandas.*",
    "pdfplumber.*",
    "pytesseract.*",
    "playwright.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "services.*",
    "admin.app",
    "scrapers.*",
]
follow_imports = "skip"
ignore_missing_imports = true