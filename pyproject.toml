[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers --durations=10"
markers = [
    "unit: testes puros (mock, zero rede/DB)",
    "integration: testes com DB real (precisa .env)",
    "e2e: Playwright + Streamlit real",
    "real: scrapers reais (lento, flaky)",
    "schema: validação schema DB via RPC",
    "performance: benchmarks <200ms",
    "llm: precisa GROQ_API_KEY",
    "asyncio: testes assíncronos",
    "slow: testes lentos (>10s)",
    "visual: testes de regressão visual",
    "flyer_health: testes que verificam URLs de imagens de flyers (rede externa)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::DeprecationWarning:supabase",
    "ignore::DeprecationWarning:httpx",
    "ignore::DeprecationWarning:httpcore",
    "ignore::DeprecationWarning:hpack",
    "ignore::DeprecationWarning:h2",
    "ignore::ResourceWarning:httpx",
    "ignore::ResourceWarning:httpcore",
    "ignore::ResourceWarning:unittest",
    "ignore::ResourceWarning:dotenv",
    "ignore:.*asyncio_default_fixture_loop_scope.*:pytest.PytestDeprecationWarning",
    "ignore:.*iscoroutinefunction.*:DeprecationWarning:pytest_asyncio",
    "ignore:.*get_event_loop_policy.*:DeprecationWarning:pytest_asyncio",
    "ignore:.*set_event_loop_policy.*:DeprecationWarning:pytest_asyncio",
]

[tool.ruff]
line-length = 120
target-version = "py314"
exclude = [".agents/"]

[tool.ruff.lint]
select = ["F", "E", "W", "B", "S", "UP", "SIM", "C4"]
ignore = ["E501", "B006", "B008", "B023", "S101"]

[tool.ruff.lint.per-file-ignores]
"admin/app.py" = ["E402"]
"scripts/*.py" = ["S501", "S603", "S311", "S112", "S110", "B007", "UP015", "C401", "E741", "W292", "S602", "S607", "S113", "F841"]
"tests/*" = ["S101", "S105", "B007", "C401", "E402", "F841", "F811", "S110", "SIM105", "SIM117"]

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
explicit_package_bases = true
exclude = [
    "scripts/archive/",
    "tests/",
    "scripts/",        # utility scripts, not core
    "scrapers/",       # network-dependent, many stub issues
    "services/",       # supabase-py JSON types cause 100+ false positives per file
    "telegram_bot/",   # python-telegram-bot stubs incomplete
    "admin/app.py",      # Streamlit + supabase type issues
    "admin/tabs/",       # dead code, stubs only, no real functions
    "data/",             # diagnostic/utility scripts
    "main.py",           # supabase-py JSON types
    "check_*.py",        # root-level utility scripts, not typechecked
]
warn_unused_ignores = false
check_untyped_defs = false
disallow_any_unimported = false
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = [
    "supabase.*",
    "postgrest.*",
    "streamlit.*",
    "plotly.*",
    "pandas.*",
    "pdfplumber.*",
    "pytesseract.*",
    "playwright.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "services.*",
    "admin.app",
    "scrapers.*",
]
follow_imports = "skip"
ignore_missing_imports = true