[pytest]
asyncio_mode = strict
markers =
    e2e: End-to-end tests against Streamlit dashboard
    integration: Integration tests requiring Supabase/external services
    visual: Visual regression tests (requires baselines or UPDATE_BASELINES=1)
    flyer_health: Flyer URL health checks (HEAD requests to external CDNs)
    supabase: Tests requiring Supabase service role credentials
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestDeprecationWarning
